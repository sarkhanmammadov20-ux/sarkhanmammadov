    <style>
      :root {
        --white: #f7f8f5;
        --soft: rgba(247, 248, 245, 0.74);
        --line: rgba(255, 255, 255, 0.17);
        --panel: rgba(6, 9, 14, 0.62);
        --ease: cubic-bezier(0.22, 1, 0.36, 1);
      }

      * { box-sizing: border-box; }

      html, body {
        margin: 0;
        min-height: 100%;
        background: #010205;
        color: var(--white);
        font-family: "Inter", "Geist", "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body { overflow: hidden; }
      button, input { font: inherit; }

      .page {
        position: relative;
        display: grid;
        min-height: 100svh;
        isolation: isolate;
        overflow: hidden;
        background:
          radial-gradient(circle at 50% 72%, rgba(25, 59, 85, 0.2), transparent 34%),
          radial-gradient(circle at 50% 110%, rgba(120, 154, 165, 0.18), transparent 35%),
          linear-gradient(180deg, #020307 0%, #020308 47%, #010204 100%);
      }

      .space-canvas {
        position: absolute;
        inset: 0;
        z-index: 0;
        width: 100%;
        height: 100%;
        opacity: 0.94;
        pointer-events: none;
      }

      }

      .moon-surface::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.04) 19%, rgba(0,0,0,0.2) 68%, rgba(0,0,0,0.56) 100%),
          radial-gradient(ellipse at 50% 0%, rgba(255,255,255,0.14), transparent 18%),
          radial-gradient(ellipse at 50% 64%, transparent 0 43%, rgba(0,0,0,0.48) 100%);
      }

      .moon-surface::after {
        content: "";
        position: absolute;
        left: 2%;
        right: 2%;
        top: 16%;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.58), transparent);
        filter: blur(0.4px);
        opacity: 0.82;
      }

      .aurora {
        position: absolute;
        left: 50%;
        top: -10svh;
        z-index: 2;
        width: min(1420px, 124vw);
        height: min(520px, 50svh);
        translate: -50% 0;
        opacity: 0.88;
        filter: blur(18px) saturate(1.25);
        mix-blend-mode: screen;
        pointer-events: none;
      }

      .aurora::before,
      .aurora::after {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(ellipse at 50% 18%, rgba(223,238,239,0.32), transparent 24%),
          radial-gradient(ellipse at 38% 34%, rgba(67,176,122,0.42), transparent 36%),
          radial-gradient(ellipse at 62% 35%, rgba(48,102,168,0.44), transparent 38%),
          radial-gradient(ellipse at 50% 48%, rgba(77,214,196,0.22), transparent 42%),
          radial-gradient(ellipse at 58% 28%, rgba(111,76,132,0.22), transparent 32%);
        transform-origin: 50% 0%;
        animation: aurora-drift 28s var(--ease) infinite alternate;
      }

      .aurora::after {
        opacity: 0.46;
        filter: blur(34px);
        animation-duration: 39s;
        animation-direction: alternate-reverse;
      }

      .limb-glow {
        position: absolute;
        left: 50%;
        bottom: 33svh;
        z-index: 3;
        width: min(1740px, 132vw);
        height: min(220px, 22svh);
        translate: -50% 0;
        background:
          radial-gradient(ellipse at 50% 100%, rgba(255,255,255,0.22), rgba(174,190,195,0.08) 15%, transparent 42%),
          radial-gradient(ellipse at 50% 92%, rgba(84,100,113,0.14), transparent 54%);
        filter: blur(10px);
        opacity: 0.64;
        animation: horizon-breathe 12s ease-in-out infinite;
        pointer-events: none;
      }

      .vignette {
        position: absolute;
        inset: 0;
        z-index: 4;
        background:
          radial-gradient(circle at 50% 44%, transparent 0 24%, rgba(0,0,0,0.18) 52%, rgba(0,0,0,0.72) 100%),
          linear-gradient(180deg, rgba(0,0,0,0.45), transparent 34%, rgba(0,0,0,0.32));
        pointer-events: none;
      }

      .signature {
        position: fixed;
        left: clamp(22px, 3vw, 38px);
        top: clamp(20px, 3vw, 34px);
        z-index: 7;
        color: rgba(247,248,245,0.62);
        font-size: 12px;
        font-weight: 400;
      }

      .hero {
        position: relative;
        z-index: 6;
        display: grid;
        place-items: center;
        min-height: 100svh;
        padding: clamp(28px, 5vw, 56px);
      }

      .founder {
        width: min(100%, 640px);
        margin-top: clamp(-18px, -3svh, 0px);
        text-align: center;
        animation: page-enter 1800ms var(--ease) both;
      }

      .portrait-shell {
        position: relative;
        width: clamp(132px, 18vw, 184px);
        aspect-ratio: 1;
        margin: 0 auto clamp(25px, 4svh, 38px);
        border-radius: 50%;
        animation: float 8.5s ease-in-out infinite;
      }

      .portrait-shell::before {
        content: "";
        position: absolute;
        inset: -28px;
        border-radius: inherit;
        background:
          radial-gradient(circle, rgba(232,241,244,0.16), transparent 58%),
          radial-gradient(circle, rgba(82,158,154,0.08), transparent 70%);
        filter: blur(12px);
      }

      .portrait-shell::after {
        content: "";
        position: absolute;
        inset: -1px;
        border-radius: inherit;
        border: 1px solid rgba(255,255,255,0.38);
        box-shadow:
          inset 0 0 0 1px rgba(255,255,255,0.06),
          0 18px 68px rgba(0,0,0,0.5),
          0 0 34px rgba(191,226,231,0.13);
      }

      .portrait {
        position: relative;
        display: block;
        width: 100%;
        height: 100%;
        border-radius: 50%;
        object-fit: cover;
        filter: grayscale(0.18) contrast(1.03) saturate(0.86);
      }

      h1 {
        margin: 0;
        font-family: "Allura", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 72px;
        font-weight: 300;
        line-height: 0.95;
        text-shadow: 0 0 36px rgba(238,244,245,0.17);
      }

      .roles {
        margin: clamp(15px, 2.2svh, 21px) auto 0;
        color: var(--soft);
        font-size: 15px;
        font-weight: 300;
        line-height: 1.8;
      }

      .coming {
        margin: clamp(36px, 6svh, 64px) 0 clamp(17px, 3svh, 24px);
        color: rgba(250,252,250,0.86);
        font-size: 13px;
        font-weight: 500;
        text-shadow: 0 0 24px rgba(225,245,247,0.24);
        animation: soft-reveal 2600ms 560ms var(--ease) both;
      }

      .waitlist {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 8px;
        width: min(100%, 500px);
        margin: 0 auto;
        padding: 6px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background:
          linear-gradient(180deg, rgba(255,255,255,0.075), rgba(255,255,255,0.02)),
          var(--panel);
        box-shadow:
          inset 0 1px 0 rgba(255,255,255,0.08),
          0 28px 80px rgba(0,0,0,0.42);
        backdrop-filter: blur(14px);
        animation: soft-reveal 2600ms 760ms var(--ease) both;
      }

      .waitlist input {
        min-width: 0;
        height: 46px;
        border: 0;
        outline: 0;
        padding: 0 8px 0 18px;
        color: var(--white);
        background: transparent;
        font-size: 14px;
        font-weight: 300;
      }

      .waitlist input::placeholder {
        color: rgba(247,248,245,0.42);
      }

      .waitlist button {
        height: 46px;
        min-width: 116px;
        border: 1px solid rgba(255,255,255,0.16);
        border-radius: 999px;
        color: rgba(8,10,13,0.94);
        background: linear-gradient(180deg, rgba(255,255,255,0.95), rgba(207,217,216,0.9));
        cursor: pointer;
        font-size: 13px;
        font-weight: 500;
        transition: transform 400ms var(--ease), background 400ms var(--ease);
      }

      .waitlist button:hover {
        transform: translateY(-1px);
        background: linear-gradient(180deg, #ffffff, #e2e9e7);
      }

      .status {
        min-height: 20px;
        margin-top: 14px;
        color: rgba(231,245,240,0.73);
        font-size: 13px;
        font-weight: 300;
        opacity: 0;
        transform: translateY(4px);
        transition: opacity 600ms var(--ease), transform 600ms var(--ease);
      }

      .status.is-visible {
        opacity: 1;
        transform: translateY(0);
      }

      .coordinates {
        position: fixed;
        right: clamp(22px, 3vw, 38px);
        bottom: clamp(18px, 3vw, 32px);
        z-index: 7;
        color: rgba(247,248,245,0.34);
        font-size: 11px;
        font-weight: 300;
      }

      @keyframes page-enter {
        from { opacity: 0; transform: translateY(18px) scale(0.985); filter: blur(8px); }
        to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
      }

      @keyframes soft-reveal {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }

      @keyframes aurora-drift {
        from { transform: translate3d(-2.2%, 2%, 0) scaleX(0.98) rotate(-1deg); }
        to { transform: translate3d(2.6%, -2%, 0) scaleX(1.04) rotate(1deg); }
      }

      @keyframes horizon-breathe {
        0%, 100% { opacity: 0.62; transform: translateY(0) scaleX(1); }
        50% { opacity: 0.86; transform: translateY(-2px) scaleX(1.012); }
      }

      @media (max-width: 640px) {
        .founder { margin-top: -4svh; }
        h1 { font-size: 46px; }
        .roles { font-size: 14px; }

        .moon-surface {
          bottom: -8svh;
          width: 190vw;
          height: 48svh;
        }

        .waitlist {
          grid-template-columns: 1fr;
          border-radius: 24px;
          padding: 8px;
        }

        .waitlist input {
          height: 48px;
          text-align: center;
          padding: 0 14px;
        }

        .waitlist button { width: 100%; }
        .signature, .coordinates { display: none; }
      }
    </style>
  </head>

              name="EMAIL"
              type="email"
              autocomplete="email"
              placeholder="Enter your email address"
              aria-label="Email address"
              required
            />
            <button type="submit">Notify Me</button>
          </form>

          <iframe name="mailchimp-hidden-frame" title="Mailchimp signup" style="display: none"></iframe>
          <div class="status" id="status" role="status" aria-live="polite"></div>
        </div>
      </section>

 
    </main>

    <script>
      const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      class SpaceScene {
        constructor(canvas) {
          this.canvas = canvas;
          this.ctx = canvas.getContext("2d");
          this.stars = [];
          this.dpr = Math.min(window.devicePixelRatio || 1, 2);
          this.resize = this.resize.bind(this);
          this.frame = this.frame.bind(this);
          window.addEventListener("resize", this.resize);
          this.resize();
          requestAnimationFrame(this.frame);
        }

        resize() {
          this.w = window.innerWidth;
          this.h = window.innerHeight;
          this.canvas.width = Math.floor(this.w * this.dpr);
          this.canvas.height = Math.floor(this.h * this.dpr);
          this.canvas.style.width = `${this.w}px`;
          this.canvas.style.height = `${this.h}px`;
          this.ctx.setTransform(this.dpr, 0, 0, this.dpr, 0, 0);

          const count = Math.floor((this.w * this.h) / 520);

          this.stars = Array.from({ length: count }, () => {
            const layer = Math.random();
            const depth = 0.35 + layer * 1.65;

            return {
              x: Math.random() * this.w,
              y: Math.random() * this.h * 0.92,
              r: layer > 0.9 ? Math.random() * 0.85 + 0.45 : Math.random() * 0.55 + 0.18,
              alpha: Math.random() * 0.38 + 0.1,
              phase: Math.random() * Math.PI * 2,
              speed: Math.random() * 0.00055 + 0.00012,
              drift: depth,
              travelX: (Math.random() * 0.58 + 0.34) * depth,
              travelY: (Math.random() * 0.18 + 0.08) * depth,
            };
          });
        }

        frame(now) {
          const ctx = this.ctx;

          ctx.clearRect(0, 0, this.w, this.h);
          ctx.fillStyle = "#010205";
          ctx.fillRect(0, 0, this.w, this.h);

          for (const star of this.stars) {
            const pulse = prefersReducedMotion ? 0 : Math.sin(now * star.speed + star.phase) * 0.12;
            const alpha = Math.max(0.03, star.alpha + pulse);

            const movingX = prefersReducedMotion
              ? star.x
              : (star.x + now * star.travelX * 0.018) % (this.w + 40) - 20;

            const movingY = prefersReducedMotion
              ? star.y
              : (star.y + now * star.travelY * 0.014) % (this.h + 40) - 20;

            const x = movingX + Math.sin(now * 0.00008 + star.phase) * star.drift * 8;
            const y = movingY + Math.cos(now * 0.00005 + star.phase) * star.drift * 4;

            ctx.beginPath();
            ctx.fillStyle = `rgba(238, 246, 245, ${alpha})`;
            ctx.arc(x, y, star.r, 0, Math.PI * 2);
            ctx.fill();
          }

          if (!prefersReducedMotion) {
            requestAnimationFrame(this.frame);
          }
        }
      }

      new SpaceScene(document.querySelector(".space-canvas"));

      const form = document.getElementById("waitlist");
      const status = document.getElementById("status");

      form.addEventListener("submit", (event) => {
        event.preventDefault();

        const email = form.email.value.trim();

        if (!email || !form.email.checkValidity()) {
          status.textContent = "Enter a valid email address.";
          status.classList.add("is-visible");
          form.email.focus();
          return;
        }

        const action = form.getAttribute("action") || "";
        const isConfigured = !action.includes("YOUR_") && !action.includes("example.");

        status.textContent = "You're on the list. See you at launch.";
        status.classList.add("is-visible");

        if (isConfigured) {
          HTMLFormElement.prototype.submit.call(form);
        }

        form.reset();
      });
    </script>
  </body>
</html>
